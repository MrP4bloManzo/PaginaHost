* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(ellipse at 60% 40%, #2d6a2d 0%, #1a4a1a 40%, #0d2e0d 100%);
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Playfair Display', serif;
}

/* Textura de hierba en el suelo */
.ground {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 18vh;
  background: linear-gradient(to top, #1a3d0a 0%, #2d6a1a 60%, transparent 100%);
  z-index: 0;
}

/* Tallos y flores */
.garden {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 100vh;
  z-index: 1;
}

.flower-group {
  position: absolute;
  bottom: 0;
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

/* Tallo */
.stem {
  position: relative;
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
}

.stem-line {
  width: 4px;
  border-radius: 2px;
  background: linear-gradient(to top, #2d6e0a, #4a9c1a);
  transform-origin: bottom center;
}

/* Hoja */
.leaf {
  position: absolute;
  width: 28px;
  height: 14px;
  background: linear-gradient(135deg, #3a8c10, #5ab820);
  border-radius: 50% 0 50% 0;
  transform-origin: left center;
}
.leaf.right {
  right: 0;
  transform-origin: right center;
  border-radius: 0 50% 0 50%;
}

/* Flor */
.flower {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  transform-origin: bottom center;
}

/* Pétalos */
.petals {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.petal {
  position: absolute;
  border-radius: 50% 50% 20% 50%;
  background: radial-gradient(ellipse at 30% 30%, #ffe566, #f0b800);
  transform-origin: center bottom;
  box-shadow: inset -2px -2px 6px rgba(0,0,0,0.15);
}

/* Centro */
.center {
  position: relative;
  z-index: 2;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #6b3a00, #3d1f00);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,180,0,0.2);
}

/* Abejas decorativas */
.bee {
  position: fixed;
  font-size: 1.4rem;
  animation: fly 14s ease-in-out infinite;
  z-index: 10;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

/* Luz de sol */
.sun-rays {
  position: fixed;
  top: -60px; right: -60px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,230,100,0.18) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: pulse-sun 4s ease-in-out infinite;
}

/* Título */
.title {
  position: fixed;
  top: 32px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,240,180,0.85);
  font-size: 2rem;
  font-style: italic;
  letter-spacing: 0.08em;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 30px rgba(255,200,0,0.3);
  z-index: 20;
  white-space: nowrap;
}

/* Partículas de luz */
.sparkle {
  position: fixed;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,240,100,0.8);
  pointer-events: none;
  z-index: 5;
  animation: sparkle-float linear infinite;
}

/* ---- Animaciones ---- */
@keyframes sway {
  0%, 100% { transform: rotate(-3deg); }
  50%       { transform: rotate(3deg); }
}
@keyframes sway-slow {
  0%, 100% { transform: rotate(-2deg); }
  50%       { transform: rotate(2deg); }
}
@keyframes bloom {
  0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
  70%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes fly {
  0%   { transform: translate(0,0) rotate(0deg); }
  20%  { transform: translate(80px,-60px) rotate(10deg); }
  45%  { transform: translate(-40px,-120px) rotate(-8deg); }
  70%  { transform: translate(120px,-50px) rotate(6deg); }
  100% { transform: translate(0,0) rotate(0deg); }
}
@keyframes pulse-sun {
  0%,100% { opacity: 0.7; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.1); }
}
@keyframes sparkle-float {
  0%   { opacity: 0; transform: translateY(0) scale(0); }
  20%  { opacity: 1; transform: translateY(-20px) scale(1); }
  80%  { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
}
@keyframes gentle-bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

<body>

<div class="sun-rays"></div>
<div class="ground"></div>
<p class="title">🌼 Flores Amarillas 🌼</p>

<div class="garden" id="garden"></div>

<!-- Abejas -->

<div class="bee" style="top:38%;left:20%;animation-delay:-3s;">🐝</div>
<div class="bee" style="top:55%;left:70%;animation-delay:-8s;font-size:1.1rem;">🐝</div>

<script>
  // ─── Configuración de flores ───────────────────────────
  const flowerDefs = [
    // [x%, stemH, petalCount, petalW, petalH, centerR, delay, swayDur, scale]
    [4,  180, 10, 28, 16, 16, 0.2,  3.8, 1.0],
    [10, 220, 12, 32, 18, 18, 0.6,  4.2, 1.15],
    [16, 160, 8,  24, 14, 14, 1.0,  3.5, 0.9],
    [22, 250, 14, 36, 20, 20, 0.3,  4.8, 1.3],
    [28, 190, 10, 28, 16, 16, 0.8,  3.6, 1.0],
    [34, 210, 12, 30, 17, 18, 0.1,  4.0, 1.1],
    [40, 270, 14, 38, 22, 22, 0.5,  5.0, 1.4],
    [46, 175, 8,  26, 15, 14, 1.2,  3.4, 0.92],
    [52, 240, 12, 34, 19, 19, 0.4,  4.5, 1.2],
    [58, 195, 10, 28, 16, 16, 0.9,  3.9, 1.0],
    [64, 215, 12, 32, 18, 17, 0.2,  4.1, 1.1],
    [70, 260, 14, 36, 21, 21, 0.7,  4.9, 1.35],
    [76, 180, 10, 26, 15, 15, 1.1,  3.7, 0.95],
    [82, 230, 12, 32, 18, 18, 0.3,  4.3, 1.15],
    [88, 200, 10, 28, 16, 16, 0.6,  3.8, 1.05],
    [94, 170, 8,  24, 14, 14, 1.4,  3.5, 0.88],
  ];

  const garden = document.getElementById('garden');

  flowerDefs.forEach(([x, stemH, petN, petW, petH, centR, delay, swayDur, sc]) => {
    const group = document.createElement('div');
    group.className = 'flower-group';
    group.style.cssText = `left:${x}%;`;

    // ── Tallo ──
    const stemWrap = document.createElement('div');
    stemWrap.className = 'stem';
    stemWrap.style.animation = `sway ${swayDur}s ease-in-out infinite`;
    stemWrap.style.animationDelay = `${delay}s`;

    // Hoja izquierda
    const leafL = document.createElement('div');
    leafL.className = 'leaf';
    leafL.style.cssText = `bottom:${stemH*0.38}px;left:-18px;transform:rotate(-30deg);`;

    // Hoja derecha
    const leafR = document.createElement('div');
    leafR.className = 'leaf right';
    leafR.style.cssText = `bottom:${stemH*0.55}px;right:-18px;transform:rotate(30deg);`;

    const stemLine = document.createElement('div');
    stemLine.className = 'stem-line';
    stemLine.style.height = `${stemH}px`;

    // ── Flor ──
    const flowerSize = (petW * 2 + centR * 2) * sc;
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.style.cssText = `
      width:${flowerSize}px;
      height:${flowerSize}px;
      animation: bloom 1s ease-out both, gentle-bob ${2.5 + delay}s ease-in-out infinite;
      animation-delay: ${delay * 0.4}s, ${delay + 1}s;
    `;

    const petalsDiv = document.createElement('div');
    petalsDiv.className = 'petals';

    for (let i = 0; i < petN; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      const angle = (360 / petN) * i;
      const dist  = centR * 0.85 * sc;
      petal.style.cssText = `
        width:${petW * sc}px;
        height:${petH * sc}px;
        transform: rotate(${angle}deg) translateY(-${dist}px);
        opacity: ${0.85 + Math.random() * 0.15};
      `;
      petalsDiv.appendChild(petal);
    }

    const center = document.createElement('div');
    center.className = 'center';
    center.style.cssText = `width:${centR * 2 * sc}px;height:${centR * 2 * sc}px;`;

    flower.appendChild(petalsDiv);
    flower.appendChild(center);

    stemWrap.appendChild(leafL);
    stemWrap.appendChild(leafR);
    stemWrap.appendChild(stemLine);
    stemWrap.appendChild(flower);
    group.appendChild(stemWrap);
    garden.appendChild(group);
  });

  // ── Partículas de luz ──
  for (let i = 0; i < 22; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.style.cssText = `
      left:${Math.random()*100}%;
      top:${30 + Math.random()*55}%;
      animation-duration:${3 + Math.random()*5}s;
      animation-delay:${Math.random()*6}s;
      opacity:0;
      width:${3+Math.random()*5}px;
      height:${3+Math.random()*5}px;
    `;
    document.body.appendChild(sp);
  }
</script>

</body>
