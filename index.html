<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETSTATION Gantt Pro</title>

<!-- FUENTES PRO -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family: 'Inter', sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:#fff;
padding:30px;
}

/* TITULOS */
h1{
font-family:'Poppins',sans-serif;
text-align:center;
font-size:30px;
margin-bottom:5px;
background: linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

h2{
text-align:center;
font-size:13px;
color:#94a3b8;
margin-bottom:20px;
}

/* BADGES */
.meta{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.badge{
background: rgba(255,255,255,0.08);
padding:6px 12px;
border-radius:20px;
font-size:11px;
border:1px solid rgba(255,255,255,0.1);
}

/* CONTENEDOR */
.container{
background: rgba(255,255,255,0.05);
border-radius:16px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
overflow:auto;
}

/* TABLA */
table{
border-collapse:collapse;
min-width:1500px;
width:100%;
}

th{
background: rgba(255,255,255,0.08);
font-size:10px;
padding:8px;
color:#cbd5f5;
font-weight:600;
}

td{
border-bottom:1px solid rgba(255,255,255,0.05);
}

.td-name{
padding:10px;
font-size:13px;
font-weight:500;
}

/* DESCRIPCION MEJORADA */
.desc{
font-size:11px;
color:#cbd5f5;
opacity:0.85;
margin-top:4px;
line-height:1.3;
}

.td-resp{
font-size:11px;
text-align:center;
color:#38bdf8;
font-weight:600;
}

/* BARRAS */
.td-week{
height:36px;
position:relative;
}

.bar{
height:22px;
margin:6px 2px;
border-radius:6px;
transition:0.25s;
box-shadow:0 0 8px rgba(0,0,0,0.4);
}

.bar:hover{
transform:scale(1.07);
filter:brightness(1.2);
}

.bar-start{border-radius:6px 0 0 6px}
.bar-end{border-radius:0 6px 6px 0}
.bar-mid{border-radius:0}
.bar-solo{border-radius:6px}

/* COLORES */
.pm{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.ku{background:linear-gradient(90deg,#a855f7,#c084fc)}
.et{background:linear-gradient(90deg,#22c55e,#4ade80)}
.all{background:linear-gradient(90deg,#f97316,#fb923c)}

/* FASE */
.phase td{
background: rgba(255,255,255,0.08);
font-weight:600;
padding:8px;
color:#22c55e;
font-family:'Poppins';
}

/* MILESTONE */
.ms{
width:12px;height:12px;
background:#ef4444;
border-radius:50%;
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
box-shadow:0 0 10px #ef4444;
}

/* LEYENDA */
.legend{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
font-size:12px;
}

.box{
width:14px;height:10px;border-radius:3px;
display:inline-block;margin-right:5px;
}
</style>
</head>

<body>

<h1>🐾 PETSTATION</h1>
<h2>Planeación Profesional del Sistema IoT</h2>

<div class="meta">
<div class="badge">👤 Pablo (Dev)</div>
<div class="badge">🎨 Karen (Diseño)</div>
<div class="badge">🔧 Erick (Hardware)</div>
<div class="badge">📅 24 semanas</div>
</div>

<div class="container">
<table>
<thead>
<tr>
<th>Actividad</th>
<th>Resp</th>

<script>
for(let i=1;i<=24;i++) document.write(`<th>S${i}</th>`);
</script>

</tr>
</thead>

<tbody id="gantt"></tbody>
</table>
</div>

<div class="legend">
<div><span class="box pm"></span>Pablo</div>
<div><span class="box ku"></span>Karen</div>
<div><span class="box et"></span>Erick</div>
<div><span class="box all"></span>Equipo</div>
</div>

<script>
const data=[

{phase:'Planeación'},
{name:'Análisis del problema<div class="desc">Definir necesidades del usuario, tipo de mascota, horarios y contexto de uso</div>',s:1,e:1,c:'pm'},
{name:'Arquitectura IoT<div class="desc">Definir flujo de datos ESP32 → MQTT → nube → usuario</div>',s:1,e:2,c:'pm'},
{name:'Diseño físico<div class="desc">Modelado del contenedor, depósitos y estructura del sistema</div>',s:1,e:2,c:'ku',ms:2},

{phase:'Desarrollo'},
{name:'Configuración ESP32<div class="desc">Instalación de entorno, librerías y pruebas iniciales</div>',s:3,e:3,c:'pm'},
{name:'Sensores ultrasónicos<div class="desc">Lectura de niveles de agua y alimento con calibración</div>',s:3,e:5,c:'pm'},
{name:'Servo y bomba<div class="desc">Control de dispensado de alimento y agua</div>',s:5,e:6,c:'pm'},
{name:'Ensamblaje hardware<div class="desc">Cableado completo y montaje físico</div>',s:6,e:8,c:'et'},
{name:'Pruebas unitarias<div class="desc">Validación individual de cada módulo del sistema</div>',s:7,e:8,c:'all',ms:8},

{phase:'IoT'},
{name:'WiFi seguro<div class="desc">Configuración de conexión con cifrado TLS</div>',s:9,e:9,c:'pm'},
{name:'MQTT<div class="desc">Implementación de comunicación bidireccional</div>',s:9,e:10,c:'pm'},
{name:'Control remoto<div class="desc">Recepción de comandos desde la nube</div>',s:11,e:12,c:'pm',ms:12},

{phase:'Validación'},
{name:'Integración total<div class="desc">Unión de todos los componentes del sistema</div>',s:13,e:14,c:'all'},
{name:'LCD y buzzer<div class="desc">Interfaz visual y sistema de alertas</div>',s:13,e:15,c:'pm'},
{name:'Calibración<div class="desc">Ajuste fino de sensores y tiempos</div>',s:14,e:16,c:'pm'},
{name:'Pruebas 7 días<div class="desc">Validación completa de estabilidad del sistema</div>',s:17,e:18,c:'all',ms:18},

{phase:'Cierre'},
{name:'Documentación<div class="desc">Código comentado, estructura y organización</div>',s:19,e:21,c:'pm'},
{name:'Reporte final<div class="desc">Resultados, métricas y conclusiones</div>',s:21,e:23,c:'all'},
{name:'Presentación<div class="desc">Diapositivas profesionales para exposición</div>',s:22,e:24,c:'all',ms:24}

];

const tbody=document.getElementById('gantt');

data.forEach(t=>{
let tr=document.createElement('tr');

if(t.phase){
tr.className='phase';
tr.innerHTML=`<td colspan="26">${t.phase}</td>`;
}else{
let html=`<td class="td-name">${t.name}</td><td class="td-resp">${t.c.toUpperCase()}</td>`;

for(let w=1;w<=24;w++){
if(w>=t.s&&w<=t.e){
let cls='bar '+t.c;
if(t.s===t.e)cls+=' bar-solo';
else if(w===t.s)cls+=' bar-start';
else if(w===t.e)cls+=' bar-end';
else cls+=' bar-mid';

html+=`<td class="td-week"><div class="${cls}"></div>${t.ms===w?'<div class="ms"></div>':''}</td>`;
}else{
html+=`<td class="td-week">${t.ms===w?'<div class="ms"></div>':''}</td>`;
}
}

tr.innerHTML=html;
}

tbody.appendChild(tr);
});
</script>

</body>
</html>
